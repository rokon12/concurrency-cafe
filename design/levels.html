<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Levels — Concurrency Café</title>
<meta name="viewport" content="width=device-width, initial-scale=1" />
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&family=Fraunces:opsz,wght@9..144,400;9..144,600&display=swap" rel="stylesheet" />
<link rel="stylesheet" href="styles.css" />
<style>
  .levels-page {
    max-width: 1100px;
    margin: 0 auto;
    padding: 56px 32px 80px;
  }
  .page-head {
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    margin-bottom: 40px;
    gap: 32px;
    flex-wrap: wrap;
  }
  .page-head h1 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 44px;
    letter-spacing: -0.02em;
    margin: 0 0 8px;
  }
  .page-head h1 em { font-style: italic; color: var(--accent); }
  .page-head .sub { color: var(--fg-1); font-size: 15px; margin: 0; }

  .progress-summary {
    display: flex;
    gap: 16px;
    align-items: center;
    background: var(--bg-1);
    border: 1px solid var(--line);
    padding: 12px 18px;
    border-radius: var(--radius);
    font-family: var(--font-mono);
    font-size: 12px;
  }
  .progress-bar {
    width: 140px;
    height: 6px;
    background: var(--bg-3);
    border-radius: 999px;
    overflow: hidden;
  }
  .progress-fill {
    height: 100%;
    background: var(--accent);
    width: 12.5%;
  }

  .chapter {
    margin-bottom: 48px;
  }
  .chapter-head {
    display: flex;
    align-items: baseline;
    gap: 16px;
    margin-bottom: 20px;
    padding-bottom: 8px;
    border-bottom: 1px solid var(--line);
  }
  .chapter-num {
    font-family: var(--font-mono);
    font-size: 12px;
    color: var(--accent);
    letter-spacing: 0.08em;
  }
  .chapter-name {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 22px;
    letter-spacing: -0.01em;
    margin: 0;
  }
  .chapter-meta {
    margin-left: auto;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-2);
  }

  .level-row {
    display: grid;
    grid-template-columns: 56px 1fr auto auto;
    gap: 20px;
    align-items: center;
    padding: 18px 20px;
    background: var(--bg-1);
    border: 1px solid var(--line);
    border-radius: var(--radius);
    text-decoration: none;
    color: inherit;
    margin-bottom: 8px;
    transition: border-color 0.15s, background 0.15s;
  }
  .level-row:hover {
    border-color: var(--accent);
    background: var(--bg-2);
  }
  .level-row.locked {
    opacity: 0.5;
    cursor: not-allowed;
  }
  .level-row.locked:hover {
    border-color: var(--line);
    background: var(--bg-1);
  }
  .level-row.complete .level-num-big { color: var(--ok); }

  .level-num-big {
    font-family: var(--font-mono);
    font-size: 28px;
    font-weight: 500;
    color: var(--fg-2);
    letter-spacing: -0.02em;
  }
  .level-info h3 {
    font-family: 'Fraunces', serif;
    font-weight: 400;
    font-size: 20px;
    margin: 0 0 4px;
    letter-spacing: -0.01em;
  }
  .level-info .desc {
    color: var(--fg-1);
    font-size: 13px;
    margin: 0;
  }
  .level-tags {
    display: flex;
    gap: 6px;
    flex-wrap: wrap;
  }
  .level-status {
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--fg-2);
    text-align: right;
    min-width: 80px;
  }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="topbar.jsx"></script>

<script type="text/babel">
const CHAPTERS = [
  {
    name: 'Shared state',
    num: 'I',
    levels: [
      { n: 1, title: 'Lost Update', desc: 'Two chefs increment the same counter. The total comes up short.', tags: ['race', 'read-modify-write'], status: 'in-progress', href: 'lesson.html' },
      { n: 2, title: 'Atomic Counter', desc: 'Replace the broken increment with a primitive that promises atomicity.', tags: ['AtomicInteger', 'CAS'], status: 'unlocked', href: '#' },
      { n: 3, title: 'Visibility', desc: 'A flag is set, but the other thread never notices. Welcome to the JMM.', tags: ['volatile', 'happens-before'], status: 'unlocked', href: '#' },
    ],
  },
  {
    name: 'Locks & coordination',
    num: 'II',
    levels: [
      { n: 4, title: 'Synchronized', desc: 'The classic intrinsic lock. When it works, when it bottlenecks.', tags: ['synchronized'], status: 'locked', href: '#' },
      { n: 5, title: 'Deadlock Kitchen', desc: 'Two chefs each hold a tool the other needs. Untangle the order.', tags: ['ReentrantLock', 'lock-ordering'], status: 'locked', href: '#' },
      { n: 6, title: 'Producer / Consumer', desc: 'A back-of-house queue. Block on empty, signal on push.', tags: ['BlockingQueue', 'wait/notify'], status: 'locked', href: '#' },
    ],
  },
  {
    name: 'Modern Java',
    num: 'III',
    levels: [
      { n: 7, title: 'Virtual Threads', desc: 'Spin up 10,000 chefs. Why does it still finish in seconds?', tags: ['Java 21', 'Loom'], status: 'locked', href: '#' },
      { n: 8, title: 'Structured Concurrency', desc: 'Scope your tasks. Fail one, cancel all. JEP 453 in practice.', tags: ['StructuredTaskScope'], status: 'locked', href: '#' },
    ],
  },
];

function App() {
  const [theme, setTheme] = React.useState('dark');
  React.useEffect(() => {
    document.documentElement.setAttribute('data-theme', theme);
  }, [theme]);

  return (
    <>
      <TopBar active="levels" theme={theme} onThemeToggle={() => setTheme(t => t === 'dark' ? 'light' : 'dark')} />
      <div className="levels-page">
        <div className="page-head">
          <div>
            <h1>Eight bugs, in <em>order</em>.</h1>
            <p className="sub">Each level builds on the last. Skip ahead at your own risk.</p>
          </div>
          <div className="progress-summary">
            <span style={{ color: 'var(--fg-2)' }}>progress</span>
            <div className="progress-bar"><div className="progress-fill" /></div>
            <span style={{ color: 'var(--fg-0)' }}>1 / 8</span>
          </div>
        </div>

        {CHAPTERS.map(ch => (
          <div key={ch.num} className="chapter">
            <div className="chapter-head">
              <span className="chapter-num">Chapter {ch.num}</span>
              <h2 className="chapter-name">{ch.name}</h2>
              <span className="chapter-meta">{ch.levels.length} levels</span>
            </div>
            {ch.levels.map(lvl => {
              const locked = lvl.status === 'locked';
              const complete = lvl.status === 'complete';
              const inProgress = lvl.status === 'in-progress';
              return (
                <a
                  key={lvl.n}
                  href={locked ? '#' : lvl.href}
                  className={`level-row ${locked ? 'locked' : ''} ${complete ? 'complete' : ''}`}
                  onClick={locked ? (e) => e.preventDefault() : undefined}
                >
                  <div className="level-num-big">{String(lvl.n).padStart(2, '0')}</div>
                  <div className="level-info">
                    <h3>{lvl.title}</h3>
                    <p className="desc">{lvl.desc}</p>
                  </div>
                  <div className="level-tags">
                    {lvl.tags.map(t => <span key={t} className="pill muted">{t}</span>)}
                  </div>
                  <div className="level-status">
                    {locked && <span>🔒 locked</span>}
                    {inProgress && <span className="pill warn">in progress</span>}
                    {complete && <span className="pill ok">✓ done</span>}
                    {lvl.status === 'unlocked' && <span style={{ color: 'var(--accent)' }}>start →</span>}
                  </div>
                </a>
              );
            })}
          </div>
        ))}
      </div>
    </>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
